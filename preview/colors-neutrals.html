<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 0; border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--ink-10); }
  .n { height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; font-family: var(--font-mono); font-size: 10px; }
  .lbl { font-family: var(--font-sans); font-weight: 600; font-size: 11px; letter-spacing: -0.01em; }
  .hex { font-size: 9px; opacity: 0.7; }
</style></head>
<body>
<div class="row">
  <div class="n" style="background:#0F0E0D;color:#FAF7F2"><span class="lbl">900</span><span class="hex">#0F0E0D</span></div>
  <div class="n" style="background:#29201C;color:#FAF7F2"><span class="lbl">800</span><span class="hex">#29201C</span></div>
  <div class="n" style="background:#453A33;color:#FAF7F2"><span class="lbl">700</span><span class="hex">#453A33</span></div>
  <div class="n" style="background:#66584F;color:#FAF7F2"><span class="lbl">600</span><span class="hex">#66584F</span></div>
  <div class="n" style="background:#897A6F;color:#FAF7F2"><span class="lbl">500</span><span class="hex">#897A6F</span></div>
  <div class="n" style="background:#B0A499;color:#0F0E0D"><span class="lbl">400</span><span class="hex">#B0A499</span></div>
  <div class="n" style="background:#D4CBC0;color:#0F0E0D"><span class="lbl">300</span><span class="hex">#D4CBC0</span></div>
  <div class="n" style="background:#E6DFD4;color:#0F0E0D"><span class="lbl">200</span><span class="hex">#E6DFD4</span></div>
  <div class="n" style="background:#F3EFE7;color:#0F0E0D"><span class="lbl">100</span><span class="hex">#F3EFE7</span></div>
  <div class="n" style="background:#FAF7F2;color:#0F0E0D"><span class="lbl">050</span><span class="hex">#FAF7F2</span></div>
</div>
<p style="margin:12px 0 0;font-size:12px;color:var(--fg-2);font-family:var(--font-sans)">Warm neutral ramp — grays drift slightly toward brown, pairing with Paper.</p>
</body></html>
