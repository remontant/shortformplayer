<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 10px; max-width: 420px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-sans); font-size: 12px; color: var(--fg-2); font-weight: 500; }
  input, select { font-family: var(--font-sans); font-size: 14px; padding: 10px 12px; border: 1px solid var(--ink-10); border-radius: var(--r-md); background: var(--paper); color: var(--ink); outline: none;
                  transition: border-color 150ms var(--ease-out-quint); }
  input:focus, select:focus { border-color: var(--ink); }
  input::placeholder { color: var(--fg-3); }
  .search { position: relative; }
  .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--fg-3); pointer-events: none; }
  .search input { padding-left: 40px; width: 100%; box-sizing: border-box; }
</style></head>
<body>
<div class="stack">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input placeholder="드라마 제목, 장르로 검색">
  </div>
  <div class="field"><span class="lbl">내 닉네임</span><input value="보라매3번출구"></div>
  <div class="field"><span class="lbl">장르 선호</span><select><option>로맨스</option><option>스릴러</option></select></div>
</div>
</body></html>
