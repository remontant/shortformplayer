<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--ink); }
  .row { display: flex; gap: 16px; align-items: center; }
  .like { width: 56px; height: 56px; border-radius: var(--r-full); border: 1px solid rgba(250,247,242,.2); background: rgba(250,247,242,.08); backdrop-filter: blur(12px);
          display: flex; align-items: center; justify-content: center; cursor: pointer; color: #FAF7F2;
          transition: transform 80ms var(--ease-out-quint); }
  .like.active { color: var(--plot-red); background: rgba(230,57,70,.12); }
  .like:active { transform: scale(0.9); }
  .capsule { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--r-full); background: rgba(15,14,13,.4); backdrop-filter: blur(12px); color: #FAF7F2; font-family: var(--font-mono); font-size: 12px; border: 1px solid rgba(250,247,242,.14); }
  .label { font-family: var(--font-mono); font-size: 11px; color: rgba(250,247,242,.55); margin-top: 8px; text-align: center; }
  .cell { display: flex; flex-direction: column; align-items: center; }
</style></head>
<body>
<div class="row">
  <div class="cell">
    <button class="like">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <div class="label">idle</div>
  </div>
  <div class="cell">
    <button class="like active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
    <div class="label">active</div>
  </div>
  <div class="cell">
    <div class="capsule">EP 04 · 1:28</div>
    <div class="label">episode capsule</div>
  </div>
  <div class="cell">
    <div class="capsule" style="background:rgba(230,57,70,.85);border-color:transparent">LIVE</div>
    <div class="label">accent capsule</div>
  </div>
</div>
</body></html>
