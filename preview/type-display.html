<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .stack > div { padding: 10px 0; border-bottom: 1px solid var(--ink-10); display: flex; align-items: baseline; gap: 16px; }
  .stack > div:last-child { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 60px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-left: auto; white-space: nowrap; }
</style></head>
<body>
<div class="stack">
  <div><span class="tag">D1</span><span class="t-display-1">Plot.</span><span class="meta">72 / 600 / -0.025em</span></div>
  <div><span class="tag">D2</span><span class="t-display-2">한 입씩 먹는 드라마</span><span class="meta">56 / 600 / -0.025em</span></div>
  <div><span class="tag">D3</span><span class="t-display-3">열 번째 소개팅</span><span class="meta">40 / 600 / -0.025em</span></div>
</div>
</body></html>
