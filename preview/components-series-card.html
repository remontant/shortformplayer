<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--paper); display: flex; gap: 16px; align-items: flex-start; }
  .card { width: 220px; background: var(--paper); border: 1px solid var(--ink-10); border-radius: var(--r-lg); box-shadow: var(--e1); overflow: hidden;
          transition: transform 150ms var(--ease-out-quint), box-shadow 150ms var(--ease-out-quint); }
  .card:hover { transform: translateY(-2px); box-shadow: var(--e2); }
  .card img { width: 100%; height: 160px; object-fit: cover; display: block; }
  .body { padding: 12px 14px; }
  .t { font-family: var(--font-sans); font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  .m { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
<div class="card">
  <img src="../assets/posters/the-tenth-date.svg" alt="">
  <div class="body"><div class="t">열 번째 소개팅</div><div class="m">S1 · 8 EP · 로맨스</div></div>
</div>
<div class="card">
  <img src="../assets/posters/midnight-store.svg" alt="">
  <div class="body"><div class="t">밤의 편의점</div><div class="m">S2 · 12 EP · 스릴러</div></div>
</div>
<div class="card">
  <img src="../assets/posters/again-eighteen.svg" alt="">
  <div class="body"><div class="t">다시, 열여덟</div><div class="m">S1 · 10 EP · 판타지</div></div>
</div>
</body></html>
