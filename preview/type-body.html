<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; }
  .stack > div { padding: 8px 0; border-bottom: 1px solid var(--ink-10); display: flex; align-items: baseline; gap: 16px; }
  .stack > div:last-child { border-bottom: none; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 60px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-left: auto; white-space: nowrap; }
</style></head>
<body>
<div class="stack">
  <div><span class="tag">H1</span><span class="t-h1">밤의 편의점</span><span class="meta">32 / 600</span></div>
  <div><span class="tag">H2</span><span class="t-h2">시즌 1 · 12화 완결</span><span class="meta">24 / 600</span></div>
  <div><span class="tag">H3</span><span class="t-h3">이어서 볼 드라마</span><span class="meta">20 / 600</span></div>
  <div><span class="tag">Body</span><span class="t-body">편의점에서 야간 알바를 하는 윤서. 새벽 3시, 손님이 아닌 것이 찾아온다.</span><span class="meta">16 / 400</span></div>
  <div><span class="tag">SM</span><span class="t-sm" style="color:var(--fg-2)">저장한 회차 · 24개</span><span class="meta">14 / 400</span></div>
  <div><span class="tag">XS</span><span class="t-xs t-caps" style="color:var(--fg-3)">UP NEXT</span><span class="meta">12 / 500 / caps</span></div>
</div>
</body></html>
