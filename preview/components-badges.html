<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--paper); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--r-full); font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
  .b-new  { background: var(--plot-red); color: #FAF7F2; }
  .b-soft { background: var(--plot-red-soft); color: var(--plot-red-press); }
  .b-ink  { background: var(--ink); color: #FAF7F2; }
  .b-gh   { background: transparent; color: var(--fg-2); border: 1px solid var(--ink-10); }
  .b-done { background: var(--n-100); color: var(--fg-2); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
</style></head>
<body>
<div class="row">
  <span class="badge b-new">NEW</span>
  <span class="badge b-soft">업데이트</span>
  <span class="badge b-ink"><span class="dot"></span>LIVE</span>
  <span class="badge b-gh">S1 · EP04</span>
  <span class="badge b-done">완결</span>
  <span class="badge b-gh">로맨스</span>
  <span class="badge b-gh">스릴러</span>
</div>
<p style="margin:16px 0 0;font-size:12px;color:var(--fg-2);font-family:var(--font-sans)">Pill-shaped, mono font. Genre / episode / status — consistent visual rhythm.</p>
</body></html>
